<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Padi Mobile</title>
    
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <style>
        /* CSS Dasar agar tampilan cantik di HP */
        body { 
            font-family: 'Arial', sans-serif; 
            margin: 0; 
            padding: 15px; 
            background-color: #f4f7f6; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { 
            width: 100%; 
            max-width: 500px; /* Ukuran maksimal di desktop, tetap penuh di HP */
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            box-sizing: border-box;
            margin-top: 20px;
        }

        h1 { font-size: 22px; color: #333; margin-bottom: 5px; }
        p { font-size: 14px; color: #777; margin-bottom: 20px; }

        /* Kotak Status Utama */
        #status-box {
            width: 100%;
            padding: 50px 10px;
            border-radius: 15px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            transition: 0.5s;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 150px;
        }

        /* Warna-warna Status */
        .fase-0 { background-color: #bdc3c7; } /* Kosong */
        .fase-1 { background-color: #27ae60; } /* Vegetatif */
        .fase-2 { background-color: #2ecc71; } /* Reproduktif */
        .fase-3 { background-color: #f1c40f; color: #333 !important; } /* Pematangan */
        .anomali { background-color: #e74c3c; } /* Error */

        #update-time { font-size: 12px; margin-top: 15px; color: #999; }
        
        #log {
            margin-top: 15px;
            font-size: 10px;
            color: #aaa;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            word-break: break-all;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Monitoring Padi</h1>
    <p>Status Pertumbuhan Real-Time</p>

    <div id="status-box" class="fase-0">MENUNGGU DATA...</div>

    <div id="update-time">Waktu check: -</div>
    
    <div id="log">Sistem Siap.</div>
</div>

<script>
    // --- KONFIGURASI INFLUXDB ---
    const CONFIG = {
        url: "https://us-east-1-1.aws.cloud2.influxdata.com", 
        token: "ieRDXoPlxImCroRqKYzySuX1xBYVIW0HQa2bOjoPwYldMyNWaJ_bA1U6s9kL2nLpbbDs_1dXWO4sCQI2CuIEMA==",
        org: "Monitoring",
        bucket: "monitoring_padi"
    };

    async function ambilData() {
        const fluxQuery = `
            from(bucket: "${CONFIG.bucket}")
            |> range(start: -1h)
            |> filter(fn: (r) => r._measurement == "pertumbuhan_padi")
            |> filter(fn: (r) => r._field == "kode_fase")
            |> last()
        `;

        try {
            const response = await fetch(`${CONFIG.url}/api/v2/query?org=${CONFIG.org}`, {
                method: 'POST',
                headers: {
                    'Authorization': `Token ${CONFIG.token}`,
                    'Content-Type': 'application/vnd.flux',
                    'Accept': 'application/csv'
                },
                body: fluxQuery
            });

            const data = await response.text();
            document.getElementById('log').innerText = "Raw CSV: " + data.substring(0, 50);
            interpretasiData(data);
        } catch (error) {
            document.getElementById('log').innerText = "Error: " + error;
        }
    }

    function interpretasiData(csv) {
        const lines = csv.trim().split('\n');
        if (lines.length < 2) return;

        const kolom = lines[lines.length - 1].split(',');
        
        // Cari angka di kolom-kolom terakhir
        let nilai = null;
        for (let i = kolom.length - 1; i >= 0; i--) {
            let item = kolom[i].trim();
            if (["-1", "0", "1", "2", "3"].includes(item)) {
                nilai = parseInt(item);
                break;
            }
        }

        updateTampilan(nilai);
    }

    function updateTampilan(kode) {
        const box = d3.select("#status-box");
        const timeDiv = document.getElementById('update-time');
        
        timeDiv.innerText = "Update: " + new Date().toLocaleTimeString();

        if (kode === 1) {
            box.text("FASE 1: VEGETATIF").attr("class", "fase-1");
        } else if (kode === 2) {
            box.text("FASE 2: REPRODUKTIF").attr("class", "fase-2");
        } else if (kode === 3) {
            box.text("FASE 3: PEMATANGAN").attr("class", "fase-3");
        } else if (kode === -1) {
            box.text("⚠️ ANOMALI").attr("class", "anomali");
        } else {
            box.text("KOSONG").attr("class", "fase-0");
        }
    }

    // Interval cek data setiap 2 detik
    setInterval(ambilData, 2000);
    ambilData();

</script>
</body>
</html>
